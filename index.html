<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location TMAX 560 - Saint-Paul</title>
<script src="https://js.stripe.com/v3/"></script>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5;}
header { background:black; color:white; padding:20px; text-align:center;}
.container { padding:20px;}
.card { background:white; padding:15px; border-radius:10px;}
button { background:black; color:white; padding:15px; border:none; width:100%; cursor:pointer;}
input { width:100%; padding:10px; margin-top:10px;}
</style>
</head>

<body>

<header>
<h1>TMAX 560 - Saint-Paul</h1>
<p>Location 110€/jour • Réservation rapide</p>
</header>

<div class="container">

<div class="card">
<h2>Réserver votre TMAX</h2>

<label>Date début</label>
<input type="date" id="start">

<label>Date fin</label>
<input type="date" id="end">

<br><br>

<button onclick="book()">Réserver (Acompte 50€)</button>

</div>

</div>

<script>
const stripe = Stripe("TA_CLE_PUBLIQUE_STRIPE");

async function book() {
    const start = document.getElementById("start").value;
    const end = document.getElementById("end").value;

    const res = await fetch("/create-checkout-session", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ start, end })
    });

    const data = await res.json();

    if (data.error) {
        alert(data.error);
        return;
    }

    stripe.redirectToCheckout({ sessionId: data.id });
}
</script>

</body>
</html>
