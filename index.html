<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location TMAX Réunion</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f0f;
  color:white;
}

.container {
  max-width:400px;
  margin:auto;
  padding:20px;
}

h1 {
  text-align:center;
}

.card {
  background:#1c1c1c;
  padding:20px;
  border-radius:15px;
}

input, select {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button {
  width:100%;
  padding:15px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

.btn-main { background:#00c853; color:white; }
.btn-wa { background:#25D366; color:white; }

.price-box {
  margin-top:10px;
  font-size:18px;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h1>TMAX Réunion</h1>
<p style="text-align:center;">Location • Saint-Paul</p>

<div class="card">

<select id="moto">
<option value="530">TMAX 530</option>
<option value="560">TMAX 560 (1)</option>
<option value="560">TMAX 560 (2)</option>
</select>

<input type="email" id="email" placeholder="Votre email">

<label>Date début</label>
<input type="date" id="start">

<label>Date fin</label>
<input type="date" id="end">

<div class="price-box" id="price">Prix : 0€</div>

<button class="btn-main" onclick="reserve()">
Réserver (Acompte 50€)
</button>

<button class="btn-wa" onclick="whatsapp()">
WhatsApp
</button>

</div>

</div>

<script>

// calcul prix selon ton image
function calculatePrice(days, moto, startDate) {

  let day = new Date(startDate).getDay(); // 0 dimanche

  let pricePerDay = 0;

  if(moto == "530"){
    if(day == 1) pricePerDay = 50;
    else if(day >=2 && day <=4) pricePerDay = 60;
    else pricePerDay = 90;
  }

  if(moto == "560"){
    if(day == 1) pricePerDay = 60;
    else if(day >=2 && day <=4) pricePerDay = 85;
    else pricePerDay = 110;
  }

  return pricePerDay * days;
}

// mise à jour prix
function updatePrice() {
  let start = document.getElementById("start").value;
  let end = document.getElementById("end").value;
  let moto = document.getElementById("moto").value;

  if(!start || !end) return;

  let d1 = new Date(start);
  let d2 = new Date(end);

  let days = (d2 - d1) / (1000*60*60*24) + 1;

  if(days <= 0) return;

  let total = calculatePrice(days, moto, start);

  document.getElementById("price").innerText = "Prix : " + total + "€";
}

document.getElementById("start").addEventListener("change", updatePrice);
document.getElementById("end").addEventListener("change", updatePrice);
document.getElementById("moto").addEventListener("change", updatePrice);

// réservation simple
function reserve() {

  let email = document.getElementById("email").value;
  let start = document.getElementById("start").value;
  let end = document.getElementById("end").value;

  if(!email || !start || !end){
    alert("Remplis tous les champs");
    return;
  }

  alert("Réservation enregistrée ✅\nAcompte 50€ à payer");

}

// WhatsApp direct
function whatsapp(){
  window.open("https://wa.me/262XXXXXXXXX?text=Bonjour je veux réserver un TMAX");
}

</script>

</body>
</html>
