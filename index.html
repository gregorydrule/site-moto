<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOC974 TMAX</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0b0b;
  color:white;
}

.hero {
  background:linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1609630875171-b1321377ee65');
  background-size:cover;
  background-position:center;
  height:90vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

h1 { color:gold; }
.btn {
  background:gold;
  color:black;
  padding:15px;
  text-decoration:none;
  border-radius:5px;
  margin:10px;
}

.section { padding:40px; text-align:center; }

.card {
  background:#1a1a1a;
  margin:15px;
  padding:20px;
  border-radius:10px;
}

input, select {
  padding:10px;
  margin:10px;
  width:80%;
}

button {
  padding:12px;
  background:gold;
  border:none;
}

#total {
  font-size:20px;
  color:gold;
  margin-top:15px;
}

.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;

}
</style>
</head>

<body>

<div class="hero">
  <h1>LOCATION TMAX</h1>
  <p>La Réunion - Tarifs imbattables</p>
  <a class="btn" href="https://wa.me/262620817434">Réserver WhatsApp</a>
</div>

<div class="section">
  <h2>Nos scooters</h2>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1558981403-c5f9899a28bc" width="100%">
    <h3>TMAX 530</h3>
    <p>50€ → 90€ / jour</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1591637333184-19aa84b3e01f" width="100%">
    <h3>TMAX 560</h3>
    <p>60€ → 110€ / jour</p>
  </div>

</div>

<div class="section">
  <h2>Simulation & Réservation</h2>

  <form action="https://formspree.io/f/mqewbegd" method="POST">

    <input type="text" name="nom" placeholder="Nom" required><br>

    <input type="tel" name="telephone" placeholder="Téléphone" required><br>

    <input type="date" id="date" name="date" required><br>

    <input type="number" id="jours" name="jours" placeholder="Nombre de jours" required><br>

    <select id="modele" name="modele">
      <option value="530">TMAX 530</option>
      <option value="560">TMAX 560</option>
    </select><br>

    <div id="total">Total : 0€</div>

    <button type="submit">Réserver</button>

  </form>
</div>

<div class="section">
  <h2>Contact</h2>
  <a class="btn" href="tel:0620817434">📞 0620817434</a>
  <a class="btn" href="https://www.facebook.com/share/1K5o4RNPMx/?mibextid=wwXIfr">Facebook</a>
</div>

<a class="whatsapp" href="https://wa.me/262620817434">💬</a>

<script>
function calculerPrix() {
  let jours = document.getElementById("jours").value;
  let modele = document.getElementById("modele").value;
  let date = new Date(document.getElementById("date").value);
  
  if(!jours || !date) return;

  let jour = date.getDay(); // 0=dimanche

  let prix = 0;

  if(modele == "530"){
    if(jour == 1) prix = 50;
    else if(jour >=2 && jour <=4) prix = 60;
    else prix = 90;
  }

  if(modele == "560"){
    if(jour == 1) prix = 60;
    else if(jour >=2 && jour <=4) prix = 85;
    else prix = 110;
  }

  let total = prix * jours;

  document.getElementById("total").innerHTML = "Total : " + total + "€";
}

document.getElementById("jours").addEventListener("input", calculerPrix);
document.getElementById("modele").addEventListener("change", calculerPrix);
document.getElementById("date").addEventListener("change", calculerPrix);
</script>

</body>
</html>
