<!DOCTYPE html>
<html>
<head>
  <title>MotoLoc Pro</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>🏍️ MotoLoc Pro</h1>

    <!-- LOGIN -->
    <div id="login">
      <input type="text" id="username" placeholder="Nom utilisateur"><br><br>
      <button onclick="login()">Se connecter</button>
    </div>

    <!-- APP -->
    <div id="app" style="display:none;">

      <p id="welcome"></p>

      <input type="date" id="date"><br><br>

      <button onclick="reserver()">Réserver</button>
      <button onclick="payer()">💳 Payer</button>

      <p id="message"></p>

      <h3>📋 Mes réservations</h3>
      <ul id="liste"></ul>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
